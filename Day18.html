<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event Bubbling</title>
  </head>
  <style>
    .container {
      background-color: aqua;
      padding: 14px;
      margin: 14px;
      border: 2px solid red;
    }

    .childcontainer {
      background-color: rgb(40, 93, 93);
      padding: 14px;
      margin: 14px;
      border: 2px solid rgb(105, 52, 241);
    }

    .child {
      background-color: rgb(196, 232, 106);
      padding: 14px;
      margin: 14px;
      border: 2px solid red;
      cursor: pointer;
    }

    .btn {
      color: darkgoldenrod;
      background-color: aquamarine;
      margin-left: 550px;
      border-radius: 40%;
      border: 2px double aqua;
      cursor: pointer;
    }
  </style>
  <body>
    <div class="container">
      <div class="childcontainer">
        <div class="child">Whats your name ??</div>
      </div>
    </div>
    <br />
    <button class="btn">lucky</button><br />
    <button class="btn1 btn">andra</button><br />
    <button class="btn2 btn">bunny</button>
    <script src="Day-18-EventBubbling.js"></script>
  </body>
</html>
